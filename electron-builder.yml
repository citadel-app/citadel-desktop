appId: com.citadel.app
productName: Citadel
publish:
  provider: github
  owner: citadel-app
  repo: citadel-desktop
  releaseType: draft
directories:
  output: dist
  buildResources: resources
protocols:
  - name: Citadel Protocol
    schemes:
      - citadel
      - codex
files:
  - out/**/*
  - package.json
  - resources/**/*
  - "!node_modules"
  - "!src"
  - "!.git"
  - "!.github"
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**
extraResources:
  - from: out/main/icons
    to: icons
    filter:
      - "**/*"
      - "!**/*.onnx"
      - "!**/*.json"
      - "!**/*.npz"
win:
  executableName: Citadel
  icon: resources/icon.png
  forceCodeSigning: false
  target:
    - nsis
    - portable
portable:
  artifactName: "citadel-${version}-${arch}-portable.${ext}"
nsis:
  artifactName: "citadel-${version}-${arch}-setup.${ext}"
  shortcutName: "${productName}"
  uninstallDisplayName: "${productName}"
  createDesktopShortcut: always
mac:
  target:
    - target: dmg
      arch:
        - universal
        - arm64
        - x64
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  entitlementsInherit: resources/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  artifactName: "citadel-${version}-${arch}.${ext}"
linux:
  executableName: citadel
  target:
    - target: AppImage
    - target: deb
  maintainer: citadel-app
  category: Utility
  artifactName: "citadel-${version}-${arch}.${ext}"
appImage:
  artifactName: "citadel-${version}-${arch}.${ext}"
npmRebuild: false
