name: Build Desktop App

on:
  repository_dispatch:
    types: [new-core-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Override release version/tag (optional, e.g. 1.1.1)'
        required: false
      draft:
        description: 'Create as draft?'
        type: boolean
        default: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: citadel-app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download Core Payload
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'citadel-app/citadel'
          version: ${{ github.event.inputs.version || 'latest' }}
          file: 'citadel-payload.zip'
          target: citadel-payload.zip
          token: ${{ steps.app-token.outputs.token }}

      - name: Prepare Payload
        shell: bash
        run: |
          mkdir -p payload_temp
          unzip -o citadel-payload.zip -d payload_temp/
          # Sync version from monorepo package.json to the build environment
          VERSION=$(node -p "require('./payload_temp/package.json').version")
          npm version $VERSION --no-git-tag-version --allow-same-version
          # Move 'out' directory to root
          rm -rf out
          mv payload_temp/out .
          rm -rf payload_temp citadel-payload.zip

      - name: Install Dependencies
        run: npm install --legacy-peer-deps --no-package-lock
        env:
          CITADEL_RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build App
        env:
          MAIN_VITE_GITHUB_CLIENT_ID: ${{ secrets.CITADEL_GITHUB_CLIENT_ID }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CITADEL_RELEASE_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            npm run build:win
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            npm run build:mac
          else
            npm run build:linux
          fi
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: citadel-artifacts-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.setup.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/*.blockmap
          retention-days: 1

  release:
    name: Create Cross-Platform Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: citadel-app

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: citadel-artifacts-*
          merge-multiple: true

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or Update Draft Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: ${{ steps.get_version.outputs.VERSION }}
          files: release-assets/*
          draft: true
          prerelease: false
          generate_release_notes: true
