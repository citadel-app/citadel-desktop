<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: transparent;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }

        .banner {
            width: 800px;
            /* Slightly larger for better splash presence */
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.3));
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body>
    <img class="banner" src="banner.png" alt="Citadel" />
</body>

</html>
